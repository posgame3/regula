<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0A0A0A;
    width: 1920px;
    height: 1080px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .email {
    font-family: 'Courier New', Courier, monospace;
    font-size: 22px;
    color: #FCFBF7;
    line-height: 2;
    letter-spacing: 0.02em;
  }

  .line {
    display: block;
    opacity: 0;
    animation: appear 0.05s forwards;
  }

  /* From / To */
  .l1  { animation-delay: 1.0s; }
  .l2  { animation-delay: 1.4s; }

  /* blank */
  .l3  { animation-delay: 1.8s; }

  /* Subject */
  .l4  { animation-delay: 2.0s; color: #FCFBF7; font-weight: bold; }

  /* blank */
  .l5  { animation-delay: 2.5s; }

  /* body lines */
  .l6  { animation-delay: 2.8s; }
  .l7  { animation-delay: 3.2s; }
  .l8  { animation-delay: 3.6s; }

  /* blank */
  .l9  { animation-delay: 4.0s; }

  /* deadline — pojawia sie ostatnia, zostaje */
  .l10 {
    animation-delay: 4.4s;
    color: #E11B1B;
    font-weight: bold;
  }

  @keyframes appear {
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div class="email">
  <span class="line l1">From: procurement@hospital-group.pl</span>
  <span class="line l2">To:&nbsp;&nbsp; marek@datamed.pl</span>
  <span class="line l3">&nbsp;</span>
  <span class="line l4">Subject: NIS2 Compliance Confirmation Required</span>
  <span class="line l5">&nbsp;</span>
  <span class="line l6">Before renewing your contract we require written</span>
  <span class="line l7">confirmation that DataMed Sp. z o.o. complies with</span>
  <span class="line l8">Directive (EU) 2022/2555 Article 21(2).</span>
  <span class="line l9">&nbsp;</span>
  <span class="line l10">Deadline: 14 days.</span>
</div>

</body>
</html>
