<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family: 'Archivo'; font-weight: 400; src: url('../fonts/Archivo-400.ttf') format('truetype'); }
  @font-face { font-family: 'Archivo'; font-weight: 500; src: url('../fonts/Archivo-500.ttf') format('truetype'); }
  @font-face { font-family: 'Archivo'; font-weight: 600; src: url('../fonts/Archivo-600.ttf') format('truetype'); }
  @font-face { font-family: 'IBM Plex Mono'; font-weight: 400; src: url('../fonts/PlexMono-400.ttf') format('truetype'); }
  @font-face { font-family: 'IBM Plex Mono'; font-weight: 500; src: url('../fonts/PlexMono-500.ttf') format('truetype'); }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0A0A0A; }

  .scene {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .scene.active { opacity: 1; pointer-events: auto; }

  #s5 { background: #FCFBF7; }
  #s6 { background: #FCFBF7; }

  /* ── Scene 5: Prestige callback ── */
  .qa-wrap {
    max-width: min(860px, 76vw);
  }

  .qa-block {
    margin-bottom: clamp(28px, 3.5vw, 54px);
  }

  /* Q — identical to Act I Scene 4 .question */
  .qa-q {
    font-family: 'Archivo', sans-serif;
    font-size: clamp(26px, 3.2vw, 48px);
    font-weight: 400;
    color: #0A0A0A;
    letter-spacing: -0.025em;
    line-height: 1.2;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .qa-q.show { opacity: 1; transform: translateY(0); }
  .qm { color: #E11B1B; }

  /* A — matches Q size; hierarchy via weight + red arrow */
  .qa-a {
    font-family: 'Archivo', sans-serif;
    font-size: clamp(26px, 3.2vw, 48px);
    font-weight: 500;
    color: #0A0A0A;
    letter-spacing: -0.025em;
    line-height: 1.25;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    margin-top: clamp(6px, 0.8vw, 12px);
    display: flex;
    align-items: baseline;
    gap: 0.5em;
  }
  .qa-a.show { opacity: 1; transform: translateY(0); }
  .qa-arrow { color: #E11B1B; flex-shrink: 0; font-weight: 400; }
  .qa-accent { color: #E11B1B; }

  /* ── Scene 6: Closing card ── */
  .closing-wrap {
    max-width: min(860px, 76vw);
  }

  .wordmark {
    font-family: 'Archivo', sans-serif;
    font-weight: 600;
    font-size: clamp(56px, 8vw, 120px);
    color: #0A0A0A;
    letter-spacing: -0.04em;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .wordmark.show { opacity: 1; }

  .rule-wrap {
    overflow: hidden;
    height: clamp(2px, 0.22vw, 3px);
    margin: clamp(12px, 1.4vw, 20px) 0;
    width: 100%;
  }
  .rule-line {
    height: 100%;
    background: #E11B1B;
    transform: scaleX(0);
    transform-origin: left center;
    transition: transform 0.85s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .rule-line.draw { transform: scaleX(1); }

  .closing-url {
    font-family: 'Archivo', sans-serif;
    font-size: clamp(20px, 2.4vw, 36px);
    font-weight: 400;
    color: #0A0A0A;
    letter-spacing: -0.015em;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    margin-bottom: clamp(14px, 1.8vw, 26px);
  }
  .closing-url.show { opacity: 1; transform: translateY(0); }

  .closing-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: clamp(10px, 1vw, 15px);
    color: #9A9A95;
    letter-spacing: 0.06em;
    line-height: 1.9;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .closing-sub.show { opacity: 1; }
  .closing-sub-accent { color: #0A0A0A; }
</style>
</head>
<body>

<!-- ── Scene 5: The Prestige — callback ── -->
<div class="scene active" id="s5">
  <div class="qa-wrap">

    <div class="qa-block">
      <div class="qa-q" id="q1">"Do I fall under NIS2<span class="qm">?"</span></div>
      <div class="qa-a" id="a1">
        <span class="qa-arrow">→</span>
        <span><span class="qa-accent">Yes.</span> Article 21(2)(d). Supply chain.</span>
      </div>
    </div>

    <div class="qa-block">
      <div class="qa-q" id="q2">"If yes — what exactly do I need to do<span class="qm">?"</span></div>
      <div class="qa-a" id="a2">
        <span class="qa-arrow">→</span>
        <span><span class="qa-accent">Day 1: MFA.</span> Day 3: Incident response plan. Day 7: Backup test.</span>
      </div>
    </div>

  </div>
</div>

<!-- ── Scene 6: Final card ── -->
<div class="scene" id="s6">
  <div class="closing-wrap">
    <div class="wordmark" id="wm">REGULA</div>
    <div class="rule-wrap"><div class="rule-line" id="rule"></div></div>
    <div class="closing-url" id="url">regula.gotowywniosek.pl</div>
    <div class="closing-sub" id="sub">
      <span class="closing-sub-accent">Built in 48 hours. Staying live.</span><br>
      Built with Opus 4.7. &nbsp;·&nbsp; github.com/posgame3/regula
    </div>
  </div>
</div>

<script>
  function $id(id) { return document.getElementById(id); }

  // S5: stagger Q&A — questions first, answers follow
  setTimeout(() => $id('q1').classList.add('show'), 800);
  setTimeout(() => $id('a1').classList.add('show'), 2400);
  setTimeout(() => $id('q2').classList.add('show'), 5200);
  setTimeout(() => $id('a2').classList.add('show'), 6800);

  // S5 → S6 at 13 s
  setTimeout(() => {
    $id('s5').classList.remove('active');
    setTimeout(() => {
      $id('s6').classList.add('active');
      setTimeout(() => $id('wm').classList.add('show'), 300);
      setTimeout(() => $id('rule').classList.add('draw'), 850);
      setTimeout(() => $id('url').classList.add('show'), 1800);
      setTimeout(() => $id('sub').classList.add('show'), 2800);
    }, 500);
  }, 13000);
</script>
</body>
</html>
