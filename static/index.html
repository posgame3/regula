<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REGULA — NIS2 Compliance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .dot { animation: pulse-dot 1.4s infinite ease-in-out both; }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes pulse-dot {
      0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body class="h-screen flex flex-col bg-white overflow-hidden">

  <!-- Header -->
  <header class="bg-[#0A2540] text-white px-6 py-3 flex items-center justify-between flex-shrink-0 shadow-lg">
    <div class="flex items-baseline gap-3">
      <span class="text-xl font-bold tracking-widest">REGULA</span>
      <span class="text-xs text-slate-400 hidden sm:inline">NIS2 Compliance Assessment</span>
    </div>
    <div class="flex items-center gap-3">
      <button id="btn-demo" onclick="runDemo()"
        class="border border-slate-500 text-slate-300 px-3 py-1 rounded-lg text-xs font-medium hover:border-slate-200 hover:text-white transition-colors">
        ▶️ Watch Marek's story
      </button>
      <div class="flex items-center gap-1 bg-[#061929] rounded-lg p-1">
        <button id="btn-pl" onclick="setLang('pl')">PL</button>
        <button id="btn-en" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </header>

  <!-- Progress bar -->
  <div class="bg-slate-50 border-b border-slate-200 px-6 py-3 flex-shrink-0">
    <div id="progress" class="flex items-center max-w-2xl mx-auto"></div>
  </div>

  <!-- Scroll area -->
  <div id="scroll" class="flex-1 overflow-y-auto">
    <div class="max-w-2xl mx-auto px-4 pt-5 pb-2 space-y-3" id="chat"></div>
    <!-- Typing indicator -->
    <div id="typing" class="hidden max-w-2xl mx-auto px-4 pb-4">
      <div class="flex items-end gap-2">
        <div class="w-7 h-7 rounded-full bg-[#0A2540] flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0">R</div>
        <div class="bg-slate-100 rounded-2xl rounded-bl-none px-4 py-3 flex gap-1.5 items-center">
          <div class="dot w-2 h-2 rounded-full bg-slate-400"></div>
          <div class="dot w-2 h-2 rounded-full bg-slate-400"></div>
          <div class="dot w-2 h-2 rounded-full bg-slate-400"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Input bar -->
  <div class="border-t border-slate-200 bg-white px-4 py-3 flex-shrink-0">
    <div class="flex gap-2 max-w-2xl mx-auto">
      <input id="input" type="text"
        class="flex-1 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#0A2540] focus:border-transparent placeholder-slate-400 disabled:bg-slate-50 disabled:text-slate-400"
        placeholder="Type your answer…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}" />
      <button id="send-btn"
        class="bg-[#0A2540] text-white px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-[#0e3566] active:bg-[#061929] transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
        onclick="sendMessage()">Send</button>
    </div>
  </div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let currentSessionId = crypto.randomUUID();
let ws = null;
let lang = 'en';
let stage = 'qualifier';
let busy = false;
let conversationStarted = false;
let streamBubble = null;
let streamText = '';
let demoRunning = false;

const STAGES = [
  { key: 'qualifier', en: 'Qualify',   pl: 'Kwalifikacja' },
  { key: 'interview', en: 'Interview', pl: 'Wywiad'        },
  { key: 'analyze',   en: 'Analyze',   pl: 'Analiza'       },
  { key: 'redteam',   en: 'Audit',     pl: 'Audyt'         },
  { key: 'draft',     en: 'Report',    pl: 'Raport'        },
];
const STAGE_IDX = { qualifier:0, interview:1, analyze:2, redteam:3, draft:4, complete:4 };

const DEMO_SCRIPTS = {
  pl: [
    "Prowadzę firmę transportu drogowego, przewozimy towary po Polsce i do Niemiec. Sektor transportu.",
    "Zatrudniamy około 80 osób — kierowcy, dyspozytor, biuro.",
    "Tak, kilku naszych klientów to duże firmy produkcyjne, które zależą od naszych dostaw.",
    "Nie, nie mamy pisemnych polityk bezpieczeństwa. Wszystko jest nieformalne.",
    "Mamy zewnętrznego informatyka, który przychodzi jak coś się psuje.",
    "Chyba mamy backupy, informatyk to ustawił, ale szczerze mówiąc nie sprawdzałem czy działają.",
    "Używamy Gmaila firmowego. Każdy ma swoje konto, ale nie ma żadnego dodatkowego logowania.",
    "Pracownicy nie mieli żadnych szkoleń z cyberbezpieczeństwa.",
    "Jak ktoś odchodzi z firmy, to informatyk usuwa konto, ale czasem trwa to kilka dni.",
    "Nie, nigdy nie testowaliśmy systemu pod kątem bezpieczeństwa.",
    "Tak, mamy umowy NDA z kontrahentami, ale nic specjalnego o bezpieczeństwie IT.",
    "Nie wiem co to szyfrowanie dysku. Laptopy są zwykłe, kupione w Media Markt.",
    "Jeśli systemy by padły, myślę że potrzebowalibyśmy 2-3 dni żeby wrócić do normalnej pracy.",
    "Tak, to prawda, warto to sprawdzić.",
    "Nie, nie mam takiego dokumentu. Nie wiedzieliśmy że trzeba.",
    "Informatyk ustawił backupy rok temu. Nie testowaliśmy odtwarzania.",
    "Nie mamy procedury. Zadzwonilibyśmy do informatyka.",
    "Nie, pracownicy nie przechodzili żadnych szkoleń.",
    "Każdy ma osobne hasło do Gmaila. Nie ma dwuetapowej weryfikacji.",
    "Nie mamy takiej listy. Wiemy mniej więcej co mamy.",
    "Umowy NDA, ale nic o wymaganiach bezpieczeństwa IT."
  ],
  en: [
    "We run a road freight company, transporting goods across Poland and into Germany. Transport sector.",
    "We have about 80 people — drivers, dispatchers, office staff.",
    "Yes, several of our clients are large manufacturing companies that depend on our deliveries.",
    "No, we don't have written security policies. Everything is informal.",
    "We have an external IT person who comes in when something breaks.",
    "I think we have backups, our IT guy set it up, but honestly I've never checked if they actually work.",
    "We use Gmail for business. Everyone has their own account but no additional login step.",
    "Employees haven't had any cybersecurity training.",
    "When someone leaves, the IT guy removes their account, but sometimes it takes a few days.",
    "No, we've never had any security testing done.",
    "Yes, we have NDAs with our contractors, but nothing specific about IT security.",
    "I don't know what disk encryption is. Laptops are regular ones, bought at a consumer store.",
    "If systems went down, I think we'd need 2-3 days to get back to normal.",
    "Yes, that's a fair point, worth checking.",
    "No, I don't have that document. We didn't know it was required.",
    "The IT guy set up backups a year ago. We haven't tested restoration.",
    "We don't have a procedure. We'd call our IT person.",
    "No, employees haven't received any security training.",
    "Everyone has their own Gmail password. No two-step verification.",
    "We don't have such a list. We roughly know what we have.",
    "NDAs with contractors but nothing about IT security requirements."
  ]
};

const RISK_COLORS = {
  critical: { badge:'bg-red-500 text-white',         tag:'bg-red-100 text-red-700'        },
  high:     { badge:'bg-orange-500 text-white',      tag:'bg-orange-100 text-orange-700'  },
  medium:   { badge:'bg-yellow-400 text-slate-800',  tag:'bg-yellow-100 text-yellow-700'  },
  low:      { badge:'bg-green-500 text-white',       tag:'bg-green-100 text-green-700'    },
};

// ── Progress bar ───────────────────────────────────────────────────────────
function renderProgress() {
  const active = STAGE_IDX[stage] ?? 0;
  document.getElementById('progress').innerHTML = STAGES.map((s, i) => {
    const done = i < active;
    const cur  = i === active;
    const circCls = done ? 'bg-green-500 border-green-500 text-white'
                  : cur  ? 'bg-[#0A2540] border-[#0A2540] text-white'
                         : 'bg-white border-slate-300 text-slate-400';
    const lblCls  = done ? 'text-green-600' : cur ? 'text-[#0A2540]' : 'text-slate-400';
    const icon    = done ? '✓' : i + 1;
    const line    = i < STAGES.length - 1
      ? `<div class="flex-1 h-px mx-2 mb-4 transition-colors ${done ? 'bg-green-400' : 'bg-slate-200'}"></div>`
      : '';
    return `
      <div class="flex items-center ${i < STAGES.length - 1 ? 'flex-1' : ''}">
        <div class="flex flex-col items-center">
          <div class="w-7 h-7 rounded-full border-2 flex items-center justify-center text-xs font-bold transition-all ${circCls}">${icon}</div>
          <div class="text-[10px] mt-1 font-medium whitespace-nowrap ${lblCls}">${s[lang]}</div>
        </div>
        ${line}
      </div>`;
  }).join('');
}

// ── Chat helpers ───────────────────────────────────────────────────────────
function esc(t) {
  return String(t)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function fmt(t) { return esc(t).replace(/\n/g,'<br>'); }

function append(html) {
  const wrap = document.createElement('div');
  wrap.innerHTML = html;
  document.getElementById('chat').appendChild(wrap);
  scrollBottom();
}

function addAgent(text) {
  append(`
    <div class="flex items-end gap-2">
      <div class="w-7 h-7 rounded-full bg-[#0A2540] flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0">R</div>
      <div class="max-w-[85%] bg-slate-100 rounded-2xl rounded-bl-none px-4 py-3 text-sm text-slate-800 leading-relaxed">${fmt(text)}</div>
    </div>`);
}

function addUser(text) {
  append(`
    <div class="flex justify-end">
      <div class="max-w-[80%] bg-[#0A2540] rounded-2xl rounded-br-none px-4 py-3 text-sm text-white leading-relaxed">${fmt(text)}</div>
    </div>`);
}

function addDivider(text) {
  append(`
    <div class="flex items-center gap-3 py-1">
      <div class="flex-1 h-px bg-slate-200"></div>
      <span class="text-xs text-slate-400 italic font-medium px-1">${esc(text)}</span>
      <div class="flex-1 h-px bg-slate-200"></div>
    </div>`);
}

function addError(text) {
  append(`
    <div class="flex items-end gap-2">
      <div class="max-w-[85%] bg-red-50 border border-red-200 rounded-2xl px-4 py-3 text-sm text-red-700 leading-relaxed">${fmt(text)}</div>
    </div>`);
}

function addThinking(text) {
  const id = 'think-' + Date.now();
  append(`
    <div class="my-1">
      <button onclick="document.getElementById('${id}').classList.toggle('hidden')"
        class="flex items-center gap-2 text-xs text-slate-500 hover:text-slate-700 transition-colors group">
        <span class="text-base leading-none">🧠</span>
        <span class="font-medium">How Regula analyzed your company (Extended Thinking)</span>
        <span class="text-slate-400 group-hover:text-slate-600 ml-1">▸ click to expand</span>
      </button>
      <div id="${id}" class="hidden mt-2 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs text-slate-500 italic leading-relaxed whitespace-pre-wrap max-h-64 overflow-y-auto">${esc(text)}</div>
    </div>`);
}

// ── Streaming helpers ──────────────────────────────────────────────────────
function startOrAppendStream(text) {
  if (!streamBubble) {
    const wrap = document.createElement('div');
    wrap.innerHTML = `
      <div class="flex items-end gap-2">
        <div class="w-7 h-7 rounded-full bg-[#0A2540] flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0">R</div>
        <div class="stream-text max-w-[85%] bg-slate-100 rounded-2xl rounded-bl-none px-4 py-3 text-sm text-slate-800 leading-relaxed"></div>
      </div>`;
    document.getElementById('chat').appendChild(wrap);
    streamBubble = wrap;
    streamText = '';
  }
  streamText += text;
  streamBubble.querySelector('.stream-text').innerHTML = fmt(streamText);
  scrollBottom();
}

function finalizeStreamBubble() {
  streamBubble = null;
  streamText = '';
  setProcessing(false);
}

function abortStreamBubble() {
  if (streamBubble) {
    streamBubble.remove();
    streamBubble = null;
    streamText = '';
  }
}

function replaceStreamBubble(text) {
  if (!streamBubble) return;
  streamText = text;
  streamBubble.querySelector('.stream-text').innerHTML = fmt(text);
  scrollBottom();
}

function addAnalysis(data) {
  const risk   = (data.overall_risk || 'medium').toLowerCase();
  const colors = RISK_COLORS[risk] || RISK_COLORS.medium;
  const counts = {};
  (data.gaps || []).forEach(g => { counts[g.risk_level] = (counts[g.risk_level] || 0) + 1; });
  const tags = ['critical','high','medium','low']
    .filter(r => counts[r])
    .map(r => {
      const c = RISK_COLORS[r] || RISK_COLORS.low;
      return `<span class="px-2 py-0.5 rounded-full text-xs font-semibold ${c.tag}">${counts[r]} ${r}</span>`;
    }).join('');
  const actions = (data.priority_3 || []).slice(0, 3).map((a, i) => `
    <li class="flex gap-3 text-sm text-slate-700">
      <span class="w-5 h-5 rounded-full bg-[#0A2540] text-white text-[10px] font-bold flex items-center justify-center flex-shrink-0 mt-0.5">${i+1}</span>
      <span>${esc(a)}</span>
    </li>`).join('');

  append(`
    <div class="rounded-2xl overflow-hidden border border-slate-200 shadow-sm my-1">
      <div class="bg-slate-800 px-5 py-4">
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Gap Analysis</span>
          <span class="px-3 py-1 rounded-full text-xs font-bold uppercase ${colors.badge}">${esc(risk)}</span>
        </div>
        <p class="text-slate-200 text-sm leading-relaxed">${esc(data.headline || '')}</p>
      </div>
      <div class="bg-white px-5 py-4">
        <div class="flex flex-wrap gap-1.5 mb-4">${tags}</div>
        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Top 3 Priority Actions</p>
        <ol class="space-y-2.5">${actions}</ol>
        ${data.good_news ? `<p class="mt-4 text-xs text-slate-500 italic">✓ ${esc(data.good_news)}</p>` : ''}
      </div>
    </div>`);
}

function addComplete(data) {
  const verdict  = data.redteam_result?.verdict?.verdict || '';
  const summary  = data.redteam_result?.verdict?.auditor_summary || '';
  const policies = data.drafter_result?.policies?.length || 0;

  const vBg = verdict.includes('FAIL')       ? 'bg-red-50 border-red-300 text-red-800'
            : verdict.includes('CONDITIONS') ? 'bg-yellow-50 border-yellow-300 text-yellow-800'
                                             : 'bg-green-50 border-green-300 text-green-800';

  append(`
    <div class="rounded-2xl border border-slate-200 overflow-hidden shadow-sm my-1">
      ${verdict ? `
      <div class="border-b ${vBg} px-5 py-4">
        <p class="text-xs font-semibold uppercase tracking-widest mb-1.5 opacity-60">Audit Simulation Verdict</p>
        <p class="font-bold text-sm">${esc(verdict)}</p>
        ${summary ? `<p class="text-xs mt-2 opacity-80 leading-relaxed">${esc(summary)}</p>` : ''}
      </div>` : ''}
      <div class="bg-white px-5 py-4 space-y-3">
        ${policies ? `<p class="text-sm text-slate-600"><span class="font-semibold">${policies} policy draft${policies > 1 ? 's' : ''}</span> generated for your critical and high-risk gaps.</p>` : ''}
        <p class="text-xs text-slate-400 italic leading-relaxed">Draft starting point for legal review — not a final compliance document.</p>
        <button disabled title="PDF export coming soon"
          class="w-full border border-slate-200 bg-slate-50 text-slate-400 py-2.5 rounded-xl text-sm font-medium cursor-not-allowed select-none">
          📄 Download Report — PDF coming soon
        </button>
      </div>
    </div>`);

  if (data.threat_actor_result?.scenarios?.length) {
    addThreatScenarios(data.threat_actor_result);
  }

  if (data.board_slides?.slides?.length) {
    addBoardPresentation(data.board_slides);
  }

  document.getElementById('input').disabled = true;
  document.getElementById('input').placeholder = 'Assessment complete.';
  document.getElementById('send-btn').disabled = true;
  scrollBottom();
}

function addThreatScenarios(data) {
  const scenarios = data.scenarios || [];
  const PROB_COLORS = {
    high:   'bg-red-500 text-white',
    medium: 'bg-orange-400 text-white',
    low:    'bg-yellow-400 text-slate-800',
  };

  const cards = scenarios.map((s, i) => {
    const prob = (s.probability || 'medium').toLowerCase();
    const probCls = PROB_COLORS[prob] || PROB_COLORS.medium;
    const detailId = 'threat-detail-' + i;
    return `
      <div class="border-b border-red-100 last:border-0 px-5 py-4">
        <div class="flex items-start justify-between gap-3 mb-1">
          <p class="font-semibold text-sm text-slate-800">${esc(s.title || '')}</p>
          <span class="px-2 py-0.5 rounded-full text-xs font-bold flex-shrink-0 ${probCls}">${esc(prob)}</span>
        </div>
        <p class="text-xs text-slate-400 mb-2">${esc(s.gap_exploited || '')}</p>
        <button onclick="document.getElementById('${detailId}').classList.toggle('hidden');this.textContent=this.textContent.includes('▸')?'▴ Hide details':'▸ See how the attack unfolds'"
          class="text-xs text-slate-500 hover:text-slate-700 transition-colors">▸ See how the attack unfolds</button>
        <div id="${detailId}" class="hidden mt-3 space-y-2">
          <div class="bg-slate-50 rounded-lg px-3 py-2 text-xs text-slate-600">
            <span class="font-semibold text-slate-700">How it starts: </span>${esc(s.how_it_starts || '')}
          </div>
          <div class="bg-slate-50 rounded-lg px-3 py-2 text-xs text-slate-600">
            <span class="font-semibold text-slate-700">What happens: </span>${esc(s.what_happens || '')}
          </div>
          <div class="bg-slate-50 rounded-lg px-3 py-2 text-xs text-slate-600">
            <span class="font-semibold text-slate-700">Business impact: </span>${esc(s.business_impact || '')}
          </div>
        </div>
        <div class="mt-3 bg-green-50 border border-green-200 rounded-lg px-3 py-2 text-xs text-green-700">
          <span class="font-semibold">Fix: </span>${esc(s.fix || '')}
          ${s.fix_effort ? `<span class="text-green-500 ml-2">(${esc(s.fix_effort)})</span>` : ''}
        </div>
      </div>`;
  }).join('');

  append(`
    <div class="rounded-2xl border-2 border-red-200 overflow-hidden shadow-sm my-3">
      <div class="bg-red-50 px-5 py-4 border-b border-red-200">
        <p class="text-sm font-bold text-red-800">⚠️ How attackers see your company</p>
        ${data.summary ? `<p class="text-xs text-red-600 mt-1 leading-relaxed">${esc(data.summary)}</p>` : ''}
      </div>
      <div class="bg-white">${cards}</div>
    </div>`);
}

function addBoardPresentation(data) {
  const slides = data.slides || [];
  const slide2 = slides.find(s => s.number === 2);
  const score = typeof slide2?.score === 'number' ? slide2.score : null;
  const scoreLabel = slide2?.score_label || '';

  const gaugeColor = score === null ? '#94a3b8'
                   : score < 40    ? '#ef4444'
                   : score < 70    ? '#f97316'
                                   : '#22c55e';
  const scoreVal = score ?? 0;
  const dash = Math.round(scoreVal);

  const gaugeHtml = score !== null ? `
    <div class="flex flex-col items-center my-4">
      <div class="relative w-24 h-24">
        <svg viewBox="0 0 36 36" class="w-24 h-24" style="transform:rotate(-90deg)">
          <circle cx="18" cy="18" r="15.9" fill="none" stroke="#374151" stroke-width="3"/>
          <circle cx="18" cy="18" r="15.9" fill="none" stroke="${gaugeColor}" stroke-width="3"
            stroke-dasharray="${dash} ${100 - dash}" stroke-linecap="round"/>
        </svg>
        <div class="absolute inset-0 flex flex-col items-center justify-center">
          <span class="text-2xl font-bold text-white">${score}</span>
        </div>
      </div>
      ${scoreLabel ? `<p class="text-xs text-slate-400 mt-1 text-center">${esc(scoreLabel)}</p>` : ''}
    </div>` : '';

  const slideCards = slides.map(s => {
    const noteId = 'note-' + s.number;
    const bullets = (s.bullets || []).map(b => `<li class="text-xs text-slate-600">• ${esc(b)}</li>`).join('');
    const actions = (s.actions || []).map(a =>
      `<li class="text-xs text-slate-600">• <span class="font-medium">${esc(a.action || '')}</span> — ${esc(a.owner || '')}${a.effort ? `, ${esc(a.effort)}` : ''}${a.cost ? `, ${esc(a.cost)}` : ''}</li>`
    ).join('');
    const recommendation = s.recommendation
      ? `<p class="text-xs text-slate-700 font-medium ml-8 mt-1">${esc(s.recommendation)}</p>` : '';
    const costAction = s.cost_of_action
      ? `<p class="text-xs text-slate-600 ml-8 mt-1"><span class="font-medium text-green-700">Action: </span>${esc(s.cost_of_action)}</p>` : '';
    const costInaction = s.cost_of_inaction
      ? `<p class="text-xs text-slate-600 ml-8 mt-1"><span class="font-medium text-red-700">Inaction: </span>${esc(s.cost_of_inaction)}</p>` : '';

    const copyPayload = JSON.stringify({
      title: s.title,
      bullets: s.bullets || [],
      actions: s.actions || [],
      recommendation: s.recommendation || '',
      speaker_note: s.speaker_note || '',
    });

    return `
      <div class="border-b border-slate-100 last:border-0 px-5 py-4">
        <div class="flex items-start gap-3">
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-2">
              <span class="w-6 h-6 rounded-full bg-[#0A2540] text-white text-xs font-bold flex items-center justify-center flex-shrink-0">${s.number}</span>
              <p class="font-semibold text-sm text-slate-800">${esc(s.title || '')}</p>
            </div>
            ${bullets ? `<ul class="space-y-1 ml-8">${bullets}</ul>` : ''}
            ${actions ? `<ul class="space-y-1 ml-8 mt-1">${actions}</ul>` : ''}
            ${recommendation}${costAction}${costInaction}
            ${s.speaker_note ? `
            <button onclick="document.getElementById('${noteId}').classList.toggle('hidden');this.textContent=this.textContent.includes('▸')?'▴ Hide speaker notes':'▸ Speaker notes'"
              class="mt-2 ml-8 text-xs text-slate-400 hover:text-slate-600 transition-colors">▸ Speaker notes</button>
            <div id="${noteId}" class="hidden ml-8 mt-1 text-xs text-slate-400 italic leading-relaxed">${esc(s.speaker_note)}</div>` : ''}
          </div>
          <button onclick='copySlide(${JSON.stringify(copyPayload)})'
            title="Copy slide to clipboard"
            class="text-slate-300 hover:text-slate-500 transition-colors flex-shrink-0 text-base mt-0.5">📋</button>
        </div>
      </div>`;
  }).join('');

  append(`
    <div class="rounded-2xl border border-slate-200 overflow-hidden shadow-sm my-3">
      <div class="bg-slate-800 px-5 py-4">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest">📊 Board Presentation</p>
        ${gaugeHtml}
      </div>
      <div class="bg-white">${slideCards}</div>
    </div>`);
}

function copySlide(payloadJson) {
  let p;
  try { p = JSON.parse(payloadJson); } catch (_) { return; }
  const lines = [`# ${p.title}`];
  (p.bullets || []).forEach(b => lines.push(`• ${b}`));
  (p.actions || []).forEach(a => lines.push(`• ${a.action} — ${a.owner}, ${a.effort}, ${a.cost}`));
  if (p.recommendation) lines.push(`\nRecommendation: ${p.recommendation}`);
  if (p.speaker_note) lines.push(`\nSpeaker note: ${p.speaker_note}`);
  navigator.clipboard?.writeText(lines.join('\n')).catch(() => {});
}

// ── Demo mode ─────────────────────────────────────────────────────────────
function updateDemoButton() {
  const btn = document.getElementById('btn-demo');
  if (!btn) return;
  btn.textContent = lang === 'pl' ? '▶️ Historia Marka' : '▶️ Watch Marek\'s story';
  btn.style.display = (conversationStarted || demoRunning) ? 'none' : '';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function waitUntilReady() {
  return new Promise(resolve => {
    const check = () => {
      if (!busy && ws && ws.readyState === WebSocket.OPEN) { resolve(); return; }
      setTimeout(check, 200);
    };
    check();
  });
}

async function runDemo() {
  if (demoRunning || conversationStarted) return;
  demoRunning = true;
  document.getElementById('btn-demo').style.display = 'none';
  const inp = document.getElementById('input');
  inp.disabled = true;
  inp.placeholder = lang === 'pl' ? 'Tryb demo…' : 'Demo mode…';
  document.getElementById('send-btn').disabled = true;
  append(`
    <div class="flex justify-center my-1">
      <span class="px-3 py-1 bg-slate-100 text-slate-500 text-xs rounded-full font-medium border border-slate-200">
        🎬 ${lang === 'pl' ? 'Tryb demo — Historia Marka' : 'Demo mode — Marek\'s story'}
      </span>
    </div>`);
  const script = DEMO_SCRIPTS[lang];
  for (let i = 0; i < script.length; i++) {
    await waitUntilReady();
    await sleep(1500);
    if (!demoRunning) break;
    conversationStarted = true;
    document.getElementById('lang-confirm')?.remove();
    addUser(script[i]);
    ws.send(JSON.stringify({ type: 'message', text: script[i], language: lang }));
    setProcessing(true);
  }
  await waitUntilReady();
  document.getElementById('input').disabled = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('input').placeholder = lang === 'pl' ? 'Wpisz odpowiedź…' : 'Type your answer…';
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function setProcessing(on) {
  busy = on;
  document.getElementById('send-btn').disabled = on;
  if (!on) setTimeout(() => document.getElementById('input').focus(), 50);
  scrollBottom();
}

function scrollBottom() {
  const el = document.getElementById('scroll');
  el.scrollTop = el.scrollHeight;
}

// ── Language toggle ────────────────────────────────────────────────────────
function updateLangButtons() {
  const active   = 'px-3 py-1 rounded text-sm font-semibold bg-white text-[#0A2540] transition-colors';
  const inactive = 'px-3 py-1 rounded text-sm font-semibold text-slate-400 hover:text-white transition-colors';
  document.getElementById('btn-en').className = lang === 'en' ? active : inactive;
  document.getElementById('btn-pl').className = lang === 'pl' ? active : inactive;
  updateDemoButton();
}

function resetSession() {
  if (ws) { try { ws.close(); } catch (_) {} ws = null; }
  currentSessionId = crypto.randomUUID();
  stage = 'qualifier';
  conversationStarted = false;
  demoRunning = false;
  busy = false;
  document.getElementById('chat').innerHTML = '';
  document.getElementById('input').disabled = false;
  document.getElementById('input').placeholder = 'Type your answer…';
  document.getElementById('send-btn').disabled = false;
  renderProgress();
  connect();
}

function setLang(l) {
  if (l === lang) return;
  if (!conversationStarted) {
    lang = l;
    updateLangButtons();
    renderProgress();
    resetSession();
  } else {
    showLangConfirm(l);
  }
}

function showLangConfirm(newLang) {
  document.getElementById('lang-confirm')?.remove();
  const langName = newLang === 'pl' ? 'Polish' : 'English';
  const div = document.createElement('div');
  div.id = 'lang-confirm';
  div.innerHTML = `
    <div class="flex items-center gap-3 px-4 py-3 bg-amber-50 border border-amber-200 rounded-xl text-sm text-slate-700">
      <span class="flex-1">Restart conversation in ${langName}?</span>
      <button onclick="confirmLangChange('${newLang}')"
        class="px-3 py-1 bg-[#0A2540] text-white rounded-lg text-xs font-semibold hover:bg-[#0e3566] active:bg-[#061929] transition-colors">Yes</button>
      <button onclick="cancelLangChange()"
        class="px-3 py-1 bg-slate-200 text-slate-700 rounded-lg text-xs font-semibold hover:bg-slate-300 transition-colors">No</button>
    </div>`;
  document.getElementById('chat').appendChild(div);
  scrollBottom();
}

function confirmLangChange(newLang) {
  document.getElementById('lang-confirm')?.remove();
  lang = newLang;
  updateLangButtons();
  renderProgress();
  resetSession();
}

function cancelLangChange() {
  document.getElementById('lang-confirm')?.remove();
}

// ── WebSocket ──────────────────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/${currentSessionId}`);

  ws.onopen = () => {
    setProcessing(true);
    ws.send(JSON.stringify({ type: 'set_language', language: lang }));
  };

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'stream_token') {
      startOrAppendStream(msg.text);
    } else if (msg.type === 'stream_end') {
      finalizeStreamBubble();
    } else if (msg.type === 'stream_abort') {
      abortStreamBubble();
    } else if (msg.type === 'stream_replace') {
      replaceStreamBubble(msg.text);
    } else if (msg.type === 'thinking_reveal') {
      addThinking(msg.text);
    } else if (msg.type === 'agent_message') {
      setProcessing(false);
      addAgent(msg.text);
    } else if (msg.type === 'stage_change') {
      stage = msg.stage;
      renderProgress();
      addDivider(msg.label || msg.stage);
      setProcessing(true);
    } else if (msg.type === 'analysis_result') {
      addAnalysis(msg.data);
    } else if (msg.type === 'complete') {
      setProcessing(false);
      addComplete(msg.data);
    } else if (msg.type === 'error') {
      setProcessing(false);
      addError('Error: ' + msg.text);
    }
  };

  ws.onerror = () => {
    setProcessing(false);
    addError('Connection error. Please refresh the page to start over.');
  };

  ws.onclose = () => setProcessing(false);
}

function sendMessage() {
  const inp  = document.getElementById('input');
  const text = inp.value.trim();
  if (!text || busy || !ws || ws.readyState !== WebSocket.OPEN) return;
  conversationStarted = true;
  document.getElementById('lang-confirm')?.remove();
  addUser(text);
  ws.send(JSON.stringify({ type: 'message', text, language: lang }));
  inp.value = '';
  setProcessing(true);
}

// ── Init ───────────────────────────────────────────────────────────────────
updateLangButtons();
renderProgress();
connect();
</script>
